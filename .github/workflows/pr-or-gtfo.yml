name: PR or GTFO responder

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  pull_request_review:
    types: [submitted]

permissions:
  issues: write
  pull-requests: write

jobs:
  respond:
    runs-on: ubuntu-latest
    steps:
      - name: PR or GTFO
        uses: NeuroShepherd/pr-or-gtfo@v1
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commands: |
            /pr-or-gtfo
            /prorgtfo